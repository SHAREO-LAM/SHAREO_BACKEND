version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shareo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shareo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: shareo_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: shareo
      MINIO_ROOT_PASSWORD: shareo123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: shareo_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 shareo shareo123; do sleep 2; done &&
      mc mb -p local/shareo-media || true &&
      mc anonymous set public local/shareo-media || true
      "

  backend:
    image: node:18-alpine
    container_name: shareo_backend
    working_dir: /app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: shareo
      NODE_ENV: development
      S3_BUCKET_NAME: shareo-media
      S3_REGION: eu-west-3
      S3_ACCESS_KEY_ID: shareo
      S3_SECRET_ACCESS_KEY: shareo123
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:9000/shareo-media
      S3_FORCE_PATH_STYLE: true
      S3_DOMAIN_IMAGES_PREFIX: domains
      S3_COMPANY_LOGOS_PREFIX: companies
    ports:
      - "3000:3000"
    volumes:
      - ./:/app:delegated
      - /app/node_modules
    command: sh -c "npm ci && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
