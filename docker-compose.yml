version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shareo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shareo
    ports:
      - '5432:5432'
    volumes:
      # Persistent volume for database data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shareo_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shareo_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: shareo
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shareo_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  shareo_network:
    driver: bridge
