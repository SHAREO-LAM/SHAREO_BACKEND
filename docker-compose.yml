version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shareo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shareo_initial_script.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: node:18-alpine
    container_name: shareo_backend
    working_dir: /app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: shareo
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./:/app:delegated
      - /app/node_modules
    command: sh -c "npm ci && npm run start:dev"
    depends_on:
      - postgres

volumes:
  postgres_data:
